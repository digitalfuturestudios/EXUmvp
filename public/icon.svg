<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
  </defs>
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Subtle shine overlay -->
  <rect width="512" height="256" rx="96" fill="url(#shine)"/>
  <!-- Letter E -->
  <text
    x="256"
    y="358"
    text-anchor="middle"
    font-family="Arial Black, system-ui, sans-serif"
    font-size="310"
    font-weight="900"
    fill="white"
    opacity="0.97"
  >E</text>
  <!-- Small decorative dot (PWA badge style) -->
  <circle cx="388" cy="124" r="36" fill="#10b981"/>
  <path d="M372 124 l10 10 l20-20" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
